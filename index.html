<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋光農場 - GitHub 穩定版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background-color: #f5f5f4; overflow: hidden; touch-action: manipulation; }
        #root { height: 100%; width: 100%; display: flex; flex-direction: column; }
        @keyframes float-down { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.8; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes pulse-fade { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // 強力錯誤攔截，避免白屏
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("捕獲錯誤:", message);
            if (message.includes("Script error") || message.includes("localStorage")) {
                // 如果是存取或腳本錯誤，嘗試手動初始化
                const rootEl = document.getElementById('root');
                if (rootEl && rootEl.innerHTML === "") {
                    rootEl.innerHTML = `<div style="padding:20px;text-align:center;"><h2>載入中稍候...</h2><button onclick="location.reload()">手動重整</button></div>`;
                }
            }
            return false; 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 強化版安全儲存 ---
        const safeGetStorage = (key) => {
            try { 
                const data = window.localStorage.getItem(key);
                return data ? data : null;
            } catch (e) { 
                console.warn("Storage access denied");
                return null; 
            }
        };
        const safeSetStorage = (key, value) => {
            try { window.localStorage.setItem(key, value); } catch (e) { }
        };

        // --- 元件內容 ---
        const IconWrapper = ({ children, className }) => <span className={`leading-none inline-block ${className || ''}`}>{children}</span>;
        const Leaf = ({className}) => <IconWrapper className={className}>🍃</IconWrapper>;
        const DollarSign = ({className}) => <IconWrapper className={className}>💰</IconWrapper>;
        const Calendar = ({className}) => <IconWrapper className={className}>📅</IconWrapper>;
        const Zap = ({className}) => <IconWrapper className={className}>⚡</IconWrapper>;
        const TreePine = ({className}) => <IconWrapper className={className}>🌲</IconWrapper>;
        const LeafyGreen = ({className}) => <IconWrapper className={className}>🥬</IconWrapper>;
        const Sprout = ({className}) => <IconWrapper className={className}>🌱</IconWrapper>;
        const Cherry = ({className}) => <IconWrapper className={className}>🍒</IconWrapper>;
        const Truck = ({className}) => <IconWrapper className={className}>🚜</IconWrapper>;
        const Scissors = ({className}) => <IconWrapper className={className}>✂️</IconWrapper>;
        const Shovel = ({className}) => <IconWrapper className={className}>⛏️</IconWrapper>;
        const AlertTriangle = ({className}) => <IconWrapper className={className}>⚠️</IconWrapper>;
        const X = ({className}) => <IconWrapper className={className}>❌</IconWrapper>;
        const Sparkles = ({className}) => <IconWrapper className={className}>✨</IconWrapper>;
        const Flag = ({className}) => <IconWrapper className={className}>🏁</IconWrapper>;

        // 資料定義
        const CROPS = {
          herb: { id: 'herb', name: '大型草本', icon: <Leaf className="text-teal-500" />, carbonReq: 0, cost: 10, growthMonths: 2, pruneStartMonth: 2, pruneInterval: 1, description: "含碳0可種。滿2月可修剪。", category: 'carbon', typhoonCarbon: 3, actions: { prune: { label: '修剪', carbon: 1, keep: true }, dig: { label: '挖除', carbon: 3, remove: true } } },
          fastTree: { id: 'fastTree', name: '速生樹種', icon: <Sprout className="text-green-600" />, carbonReq: 0, cost: 15, growthMonths: 6, pruneStartMonth: 6, pruneInterval: 2, description: "含碳0可種。滿6月可修剪。", category: 'carbon', typhoonCarbon: 15, actions: { prune: { label: '修剪', carbon: 3, keep: true }, dig: { label: '挖除', baseCarbon: 15, bonusCarbon: 25, bonusThreshold: 24, remove: true } } },
          vegetable: { id: 'vegetable', name: '蔬菜', icon: <LeafyGreen className="text-green-500" />, carbonReq: 5, cost: 1, growthMonths: 1, description: "含碳5可種。短期獲利。", category: 'money', typhoonCarbon: 1, actions: { harvest: { label: '收成', money: 10, carbon: -1, remove: true } } },
          shrub: { id: 'shrub', name: '果實灌木', icon: <Cherry className="text-pink-600" />, carbonReq: 15, cost: 20, growthMonths: 12, description: "含碳15可種。長期作物。", category: 'money', typhoonCarbon: 15, actions: { harvest: { label: '收成', money: 300, carbon: -30, keep: true, resetGrowth: 3 }, dig: { label: '挖除', carbon: 15, remove: true } } },
          fruitTree: { id: 'fruitTree', name: '果樹', icon: <TreePine className="text-red-500" />, carbonReq: 30, cost: 20, growthMonths: 24, description: "含碳30可種。高經濟價值。", category: 'money', typhoonCarbon: 15, actions: { harvest: { label: '收成', money: 500, carbon: -50, keep: true, resetGrowth: 6 }, dig: { label: '挖除', carbon: 15, remove: true } } },
          premiumTree: { id: 'premiumTree', name: '極相林木', icon: <TreePine className="text-green-800" />, carbonReq: 50, cost: 30, growthMonths: 36, pruneStartMonth: 12, pruneInterval: 6, description: "含碳50可種。冬日落葉。", category: 'carbon', typhoonCarbon: 50, actions: { prune: { label: '修剪', carbon: 25, keep: true }, dig: { label: '挖除', baseCarbon: 15, bonusCarbon: 50, bonusThreshold: 36, remove: true } } }
        };

        const ALL_EVENTS = {
          1: { id: 1, name: '志工招募', desc: '成功吸引附近居民加入志工', type: 'good' },
          2: { id: 2, name: '農夫市集', desc: '參與假日農夫市集擺攤', type: 'good' },
          3: { id: 3, name: '輕度颱風', desc: '隨機移除作物，殘枝化作養分', type: 'bad' },
          6: { id: 6, name: '受邀演講', desc: '成功招募志工，獲得講師費', type: 'good' },
          8: { id: 8, name: '極端氣候(晴)', desc: '日照過強，暫停收成', type: 'weather' },
          9: { id: 9, name: '政府補助', desc: '成功爭取到補助經費', type: 'good' },
        };

        const getSeason = (m) => { if (m >= 3 && m <= 5) return 'spring'; if (m >= 6 && m <= 8) return 'summer'; if (m >= 9 && m <= 11) return 'autumn'; return 'winter'; };

        function App() {
          const [gameState, setGameState] = useState('intro');
          const [money, setMoney] = useState(5000);
          const [carbon, setCarbon] = useState(0); 
          const [year, setYear] = useState(1);
          const [month, setMonth] = useState(1);
          const [actionPoints, setActionPoints] = useState(10);
          const [grid, setGrid] = useState(Array(36).fill(null)); 
          const [selectedCrop, setSelectedCrop] = useState(null);
          const [highScores, setHighScores] = useState([]);
          const [playerName, setPlayerName] = useState('');
          const [showEventModal, setShowEventModal] = useState(false);
          const [quarterlyReport, setQuarterlyReport] = useState(null);
          const [activeTab, setActiveTab] = useState('farm');

          useEffect(() => {
              const saved = safeGetStorage('lsFarmScores');
              if (saved) { try { setHighScores(JSON.parse(saved)); } catch(e) {} }
          }, []);

          const handleGameEnd = () => {
              const finalScore = (carbon * 10) + money;
              const newRecord = { name: playerName || "匿名農夫", score: finalScore, carbon, money, date: new Date().toLocaleDateString() };
              const updated = [...highScores, newRecord].sort((a,b)=>b.score-a.score).slice(0,5);
              setHighScores(updated);
              safeSetStorage('lsFarmScores', JSON.stringify(updated));
              setGameState('finished');
          };

          const nextMonth = () => {
              let nm = month + 1; let ny = year;
              if (nm > 12) { nm = 1; ny++; }
              if (ny > 5) { handleGameEnd(); return; }
              
              const ng = grid.map(c => {
                  if(!c) return null;
                  return { ...c, ageMonths: c.ageMonths + 1, stage: (c.ageMonths + 1 >= c.growthMonths ? 'mature' : 'growing') };
              });
              setGrid(ng); setMonth(nm); setYear(ny); setActionPoints(10);
              
              if (nm % 3 === 0) {
                  const evt = ALL_EVENTS[Object.keys(ALL_EVENTS)[Math.floor(Math.random()*6)]];
                  setQuarterlyReport({ title: `第 ${ny} 年 第 ${Math.ceil(nm/3)} 季報告`, event: evt });
                  setShowEventModal(true);
              }
          };

          const handlePlant = (i) => {
              if (!selectedCrop || actionPoints <= 0) return;
              const crop = CROPS[selectedCrop];
              if (money < crop.cost) return;
              const ng = [...grid];
              ng[i] = { ...crop, ageMonths: 0, stage: 'seed' };
              setGrid(ng); setMoney(m => m - crop.cost); setActionPoints(ap => ap - 1);
          };

          return (
            <div className="flex flex-col h-full bg-stone-50 overflow-hidden">
              {gameState === 'intro' ? (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-green-900 text-white">
                  <h1 className="text-4xl font-bold mb-4">尋光農場</h1>
                  <input className="text-black p-3 rounded mb-4" placeholder="輸入名稱" value={playerName} onChange={e=>setPlayerName(e.target.value)} />
                  <button onClick={()=>setGameState('playing')} className="bg-yellow-400 text-green-900 px-10 py-3 rounded-full font-bold">進入農場</button>
                </div>
              ) : gameState === 'playing' ? (
                <>
                  <header className="p-4 bg-white shadow flex justify-between font-bold">
                    <div>Y{year} M{month} | ⚡{actionPoints}</div>
                    <div className="text-green-700">💰{money} | 🍃{carbon}</div>
                  </header>
                  
                  <div className="flex md:hidden border-b">
                    <button onClick={()=>setActiveTab('farm')} className={`flex-1 p-3 ${activeTab==='farm'?'bg-green-100 border-b-2 border-green-600':''}`}>農場</button>
                    <button onClick={()=>setActiveTab('shop')} className={`flex-1 p-3 ${activeTab==='shop'?'bg-blue-100 border-b-2 border-blue-600':''}`}>商店</button>
                  </div>

                  <main className="flex-1 flex overflow-hidden">
                    <aside className={`${activeTab==='shop'?'flex':'hidden'} md:flex w-full md:w-64 flex-col p-4 bg-white border-r overflow-y-auto`}>
                      <h3 className="font-bold mb-3">作物清單</h3>
                      {Object.values(CROPS).map(c => (
                        <button key={c.id} onClick={()=>setSelectedCrop(c.id)} className={`p-3 mb-2 rounded border text-left ${selectedCrop===c.id?'bg-green-50 border-green-500':'bg-white'}`}>
                          <div className="font-bold">{c.name} (${c.cost})</div>
                          <div className="text-xs opacity-60">{c.description}</div>
                        </button>
                      ))}
                    </aside>
                    <section className={`${activeTab==='farm'?'flex':'hidden'} md:flex flex-1 p-4 flex-col items-center overflow-y-auto`}>
                       <div className="grid grid-cols-6 gap-1 w-full max-w-md">
                          {grid.map((c, i) => (
                            <div key={i} onClick={()=>handlePlant(i)} className="aspect-square border bg-white rounded flex items-center justify-center text-2xl relative">
                               {c ? (c.stage==='seed'?'🌱':c.icon) : ""}
                               {c && <div className="absolute bottom-0 w-full h-1 bg-gray-200"><div className="h-full bg-green-500" style={{width:`${(c.ageMonths/c.growthMonths)*100}%`}}></div></div>}
                            </div>
                          ))}
                       </div>
                       <button onClick={nextMonth} className="mt-8 bg-stone-800 text-white px-8 py-3 rounded-xl font-bold">下個月</button>
                    </section>
                  </main>
                </>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-stone-900 text-white">
                  <h2 className="text-3xl font-bold mb-4">結算成績</h2>
                  <div className="space-y-2 mb-6">
                    {highScores.map((s,i) => <div key={i}>{s.name}: {s.score}分 ({s.date})</div>)}
                  </div>
                  <button onClick={()=>location.reload()} className="bg-white text-black px-6 py-2 rounded">回主選單</button>
                </div>
              )}

              {showEventModal && quarterlyReport && (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4">
                  <div className="bg-white p-6 rounded-xl max-w-xs w-full">
                    <h3 className="font-bold text-lg mb-2">{quarterlyReport.title}</h3>
                    <div className="p-3 bg-blue-50 rounded mb-4">
                      <b>{quarterlyReport.event.name}</b>: {quarterlyReport.event.desc}
                    </div>
                    <button onClick={()=>setShowEventModal(false)} className="w-full bg-stone-800 text-white py-2 rounded">收到</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
