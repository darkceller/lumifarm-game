<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趨合森林 Pro：64格演替挑戰</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0a0c0a; color: #e2e8f0; margin: 0; overflow: hidden; }
        /* 擴展為 8 欄 */
        .farm-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; width: 100%; max-width: 800px; }
        .cell-aspect { aspect-ratio: 1 / 1; transition: all 0.3s; border-width: 1px; }
        .glass-panel { background: rgba(20, 30, 20, 0.9); backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.05); }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
        .pulse-active { animation: pulse-green 0.5s ease-out; }
        .progress-bar { transition: width 0.5s ease-in-out; }
        .tutorial-overlay { background: rgba(0,0,0,0.9); z-index: 100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const VICTORY_TARGET = 2000; // 勝利目標：2000 熵減值

        const CROPS = {
            mango: { id: 'mango', name: '芒果 (冠層)', icon: '🌳', cost: 250, syntropy: 120, growth: 30, provides: ['shade'], minSyntropy: 400, desc: '頂層優勢：需高熵減環境', biomass: 100, permanent: true },
            banana: { id: 'banana', name: '香蕉 (蓄水)', icon: '🍌', cost: 120, syntropy: 40, growth: 15, provides: ['moisture'], minSyntropy: 100, desc: '產出大量生物量與水分', biomass: 50, permanent: true },
            pigeonPea: { id: 'pigeonPea', name: '樹豆 (先驅)', icon: '🌿', cost: 50, syntropy: 20, growth: 8, provides: ['nitrogen'], minSyntropy: 0, desc: '固氮先驅：改良土質基礎', biomass: 25, permanent: true },
            sweetPotato: { id: 'sweetPotato', name: '地瓜葉 (覆蓋)', icon: '🍃', cost: 20, syntropy: 8, growth: 4, provides: ['ground_cover'], minSyntropy: 0, desc: '地表守護：自動壓制雜草', biomass: 12, permanent: true },
            ginger: { id: 'ginger', name: '薑黃 (耐陰)', icon: '🍠', cost: 40, syntropy: 30, growth: 10, needs: ['shade'], minSyntropy: 150, desc: '高經濟伴生：需有遮蔭', biomass: 220, permanent: false }
        };

        function App() {
            const [showTutorial, setShowTutorial] = useState(true);
            const [isVictory, setIsVictory] = useState(false);
            const [biomass, setBiomass] = useState(2000); 
            const [syntropy, setSyntropy] = useState(0);  
            const [year, setYear] = useState(1);
            const [month, setMonth] = useState(1);
            const [ap, setAp] = useState(15);
            const [pulseIndex, setPulseIndex] = useState(null);
            
            // 初始化 8x8 = 64 格，全空地
            const [grid, setGrid] = useState(() => 
                Array(64).fill(null).map(() => ({ content: null }))
            );
            
            const [selectedCrop, setSelectedCrop] = useState('pigeonPea');
            const [logs, setLogs] = useState(['目標：累積 2000 熵減值以達成演替。']);

            useEffect(() => {
                if (syntropy >= VICTORY_TARGET) setIsVictory(true);
            }, [syntropy]);

            const getNeighbors = (index) => {
                const res = [], x = index % 8, y = Math.floor(index / 8);
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < 8 && ny >= 0 && ny < 8) res.push(ny * 8 + nx);
                    }
                }
                return res;
            };

            const handleNextMonth = () => {
                let nm = month + 1, ny = year;
                if (nm > 12) { nm = 1; ny++; }
                
                const newGrid = grid.map((cell, i) => {
                    const neighbors = getNeighbors(i);
                    const neighborContents = neighbors.map(ni => grid[ni].content).filter(Boolean);
                    
                    if (cell.content?.isWeed) {
                        if (neighborContents.some(nc => nc.provides?.includes('ground_cover'))) return { ...cell, content: null };
                        return cell; 
                    }
                    if (!cell.content) {
                        if (Math.random() > 0.95) return { ...cell, content: { name: '雜草', icon: '🌾', isWeed: true } };
                        return cell;
                    }

                    let boost = 1;
                    if (neighborContents.some(nc => nc.provides?.includes('nitrogen'))) boost += 0.5;
                    if (cell.content.needs?.includes('shade') && neighborContents.some(nc => nc.provides?.includes('shade'))) boost += 1;
                    
                    const nextAge = (cell.content.age || 0) + boost;
                    return { ...cell, content: { ...cell.content, age: Math.max(0, nextAge), isMature: nextAge >= cell.content.growth } };
                });

                setGrid(newGrid); setMonth(nm); setYear(ny);
                setAp(Math.min(25, ap + 12)); 
                addLog(`進入 Y${ny} M${nm}。`);
            };

            const handleCellClick = (i) => {
                const cell = grid[i];
                if (ap <= 0) return;
                
                // 邏輯 2: 必須為空地或雜草才能種植
                if (!cell.content || cell.content.isWeed) {
                    const crop = CROPS[selectedCrop];
                    if (biomass < crop.cost) { addLog("⚠️ 生物量不足！"); return; }
                    if (syntropy < (crop.minSyntropy || 0)) {
                        addLog(`⚠️ 熵減值不足！${crop.name} 需達 ${crop.minSyntropy}`); return;
                    }
                    
                    const newGrid = [...grid];
                    newGrid[i].content = { ...crop, age: 0, isMature: false };
                    setGrid(newGrid); setBiomass(b => b - crop.cost); setAp(a => a - 1);
                    addLog(`🌱 種下 ${crop.name}`);
                } 
                // 必須成熟才能點擊（收成/修枝）
                else if (cell.content.isMature) {
                    setBiomass(b => b + (cell.content.biomass || 0));
                    setSyntropy(s => s + (cell.content.syntropy || 0));
                    
                    setPulseIndex(i);
                    setTimeout(() => setPulseIndex(null), 500);
                    
                    const neighbors = getNeighbors(i);
                    const newGrid = [...grid];
                    
                    // 邏輯 1: 降低加速比例至 1.5
                    neighbors.forEach(ni => {
                        if (newGrid[ni].content && !newGrid[ni].content.isMature) {
                            newGrid[ni].content.age += 1.5; 
                        }
                    });

                    if (cell.content.permanent) {
                        newGrid[i].content = { ...cell.content, age: 0, isMature: false };
                        addLog(`✂️ 修枝 ${cell.content.name}，釋放生長脈衝。`);
                    } else {
                        newGrid[i].content = null;
                        addLog(`🧺 收穫 ${cell.content.name}，騰出演替空間。`);
                    }
                    setGrid(newGrid); setAp(a => a - 1);
                } else {
                    addLog("⏳ 植物尚未成熟，無法進行修枝。");
                }
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 6));

            return (
                <div className="h-screen w-screen flex flex-col md:flex-row relative bg-[#050605]">
                    
                    {isVictory && (
                        <div className="victory-overlay fixed inset-0 flex items-center justify-center p-4">
                            <div className="bg-[#141a14] border-4 border-green-500 rounded-[3rem] p-12 max-w-2xl w-full text-center shadow-[0_0_50px_rgba(74,222,128,0.3)]">
                                <h2 className="text-5xl font-black text-green-400 mb-4 tracking-tighter">演替巔峰達成！</h2>
                                <p className="text-xl text-slate-400 mb-8 font-bold">系統熵減值成功突破 {VICTORY_TARGET}</p>
                                <div className="bg-black/50 p-8 rounded-3xl mb-10">
                                    <span className="text-slate-500 text-sm block mb-2">總演替時間</span>
                                    <div className="text-6xl font-black text-white">{year} <span className="text-2xl text-green-700">Y</span> {month} <span className="text-2xl text-green-700">M</span></div>
                                </div>
                                <button onClick={() => window.location.reload()} className="w-full bg-green-600 py-6 rounded-3xl text-2xl font-black text-white hover:bg-green-500 transition-all">開啟新的實驗循環 🔄</button>
                            </div>
                        </div>
                    )}

                    {showTutorial && (
                        <div className="tutorial-overlay fixed inset-0 flex items-center justify-center p-4">
                            <div className="bg-[#141a14] border-2 border-green-900/50 rounded-[3rem] p-10 max-w-2xl w-full">
                                <h2 className="text-3xl font-black text-green-400 mb-6 text-center italic">趨合模擬挑戰：目標 2000</h2>
                                <ul className="space-y-4 text-slate-300 font-bold mb-8">
                                    <li className="flex items-center gap-3">🔲 <span>**64格空間**：全部為純淨土地，自由規劃。</span></li>
                                    <li className="flex items-center gap-3">✂️ <span>**穩健脈衝**：修枝會帶來 +1.5 的鄰近生長加速。</span></li>
                                    <li className="flex items-center gap-3">🔒 <span>**先收後種**：格位已有植物時，必須等成熟修枝後才能更換。</span></li>
                                    <li className="flex items-center gap-3">🏁 <span>**勝利條件**：土壤熵減值 (Syntropy) 達到 2000。</span></li>
                                </ul>
                                <button onClick={() => setShowTutorial(false)} className="w-full bg-green-700 py-5 rounded-3xl text-2xl font-black text-white shadow-lg">啟動演替 🚀</button>
                            </div>
                        </div>
                    )}

                    <aside className="w-full md:w-80 glass-panel border-b md:border-r border-green-900/20 flex flex-col z-10">
                        <div className="p-8 bg-black/40">
                            <h1 className="text-3xl font-black text-green-500 tracking-tighter uppercase italic">Syntropy v4</h1>
                            <div className="h-1 w-12 bg-green-800 mt-2"></div>
                        </div>
                        
                        <div className="p-6 space-y-4">
                            <div className="bg-black/60 p-5 rounded-2xl border border-green-900/30">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-[10px] font-black text-green-700 uppercase tracking-widest">土壤熵減值 (目標 2000)</span>
                                    <span className="text-lg font-black text-green-400">{syntropy}</span>
                                </div>
                                <div className="h-2 w-full bg-green-950 rounded-full overflow-hidden">
                                    <div className="h-full bg-green-400 progress-bar shadow-[0_0_10px_rgba(74,222,128,0.5)]" style={{ width: `${Math.min(100, (syntropy/VICTORY_TARGET)*100)}%` }}></div>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-black/60 p-3 rounded-2xl border border-white/5 text-center">
                                    <div className="text-[9px] font-bold text-slate-500">生物量資源</div>
                                    <div className="text-xl font-black text-amber-500">{biomass}</div>
                                </div>
                                <div className="bg-black/60 p-3 rounded-2xl border border-white/5 text-center">
                                    <div className="text-[9px] font-bold text-slate-500">當前時間</div>
                                    <div className="text-lg font-black text-white italic">Y{year} M{month}</div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 hidden md:block">
                            <div className="space-y-2">
                                {Object.values(CROPS).map(crop => {
                                    const isLocked = syntropy < (crop.minSyntropy || 0);
                                    return (
                                        <button key={crop.id} onClick={() => !isLocked && setSelectedCrop(crop.id)}
                                            className={`w-full p-4 rounded-xl border transition-all flex items-center gap-3
                                            ${isLocked ? 'opacity-20 grayscale border-transparent bg-white/5 cursor-not-allowed' : 
                                            (selectedCrop === crop.id ? 'border-green-500 bg-green-500/10' : 'border-transparent bg-white/5 hover:bg-white/10')}`}>
                                            <span className="text-3xl">{crop.icon}</span>
                                            <div className="text-left">
                                                <div className="font-black text-white text-sm">{crop.name}</div>
                                                <div className="text-[9px] text-slate-500 leading-tight">{crop.desc}</div>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col p-4 items-center justify-center relative">
                        {/* 能量 AP */}
                        <div className="w-full max-w-md mb-6">
                            <div className="flex justify-between items-end mb-1">
                                <span className="text-[10px] font-black text-green-900 tracking-tighter">ENERGY (AP)</span>
                                <span className="text-lg font-black text-green-500">{ap}</span>
                            </div>
                            <div className="h-1 w-full bg-green-950/20 rounded-full">
                                <div className="h-full bg-green-600 transition-all duration-500" style={{ width: `${(ap / 25) * 100}%` }}></div>
                            </div>
                        </div>

                        <div className="farm-grid">
                            {grid.map((cell, i) => (
                                <div key={i} onClick={() => handleCellClick(i)}
                                    className={`cell-aspect rounded-lg cursor-pointer flex items-center justify-center relative transition-all active:scale-90
                                    ${pulseIndex === i ? 'pulse-active bg-green-500/10' : 'bg-white/5 hover:bg-white/10 border-white/5'}`}>
                                    {cell.content ? (
                                        <div className="relative flex items-center justify-center w-full h-full">
                                            <span className={`text-2xl md:text-3xl animate-pop ${cell.content.isMature ? 'animate-bounce drop-shadow-[0_0_8px_rgba(74,222,128,0.6)]' : 'opacity-60'}`}>
                                                {cell.content.isWeed ? '🌾' : (cell.content.isMature ? cell.content.icon : '🌱')}
                                            </span>
                                            {!cell.content.isMature && !cell.content.isWeed && (
                                                <div className="absolute bottom-1 w-1/2 h-0.5 bg-white/10 rounded-full overflow-hidden">
                                                    <div className="h-full bg-green-500" style={{ width: `${Math.min(100, (cell.content.age / cell.content.growth) * 100)}%` }}></div>
                                                </div>
                                            )}
                                        </div>
                                    ) : null}
                                </div>
                            ))}
                        </div>

                        <button onClick={handleNextMonth} className="mt-8 px-12 bg-green-900/10 border border-green-500/20 text-green-400 py-5 rounded-2xl font-black text-xl hover:bg-green-900/30 active:scale-95 transition-all">
                            📅 下一個演替週期
                        </button>
                    </main>

                    <div className="fixed bottom-4 right-4 w-64 pointer-events-none z-50">
                        <div className="bg-black/80 backdrop-blur-md p-4 rounded-2xl border border-white/5">
                            <p className="text-green-900 text-[9px] font-black mb-2 tracking-widest uppercase italic">Eco Log</p>
                            <div className="space-y-1">
                                {logs.map((log, i) => (
                                    <div key={i} className={`text-[11px] font-bold ${log.includes('✂️') ? 'text-yellow-400' : 'text-green-600/70'}`}>
                                        • {log}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
