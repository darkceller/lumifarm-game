<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趨合森林：演替模擬器 Syntropy Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #1a1c1a; color: #e2e8f0; margin: 0; overflow: hidden; }
        .farm-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 100%; max-width: 650px; }
        .cell-aspect { aspect-ratio: 1 / 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-width: 2px; }
        .glass-panel { background: rgba(30, 41, 30, 0.8); backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.1); }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
        .pulse-active { animation: pulse-green 0.6s ease-out; }
        .progress-bar { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .tutorial-overlay { background: rgba(0,0,0,0.92); z-index: 100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CROPS = {
            mango: { id: 'mango', name: '芒果 (胎積期)', icon: '🌳', cost: 200, syntropy: 100, growth: 25, provides: ['shade'], minSyntropy: 40, desc: '頂層優勢種：需在演替中後期種植', biomass: 80, permanent: true },
            banana: { id: 'banana', name: '香蕉 (蓄水)', icon: '🍌', cost: 100, syntropy: 30, growth: 12, provides: ['moisture'], minSyntropy: 15, desc: '生物量工廠：提供大量有機質', biomass: 40, permanent: true },
            pigeonPea: { id: 'pigeonPea', name: '樹豆 (固氮)', icon: '🌿', cost: 40, syntropy: 15, growth: 6, provides: ['nitrogen'], minSyntropy: 0, desc: '先驅修復種：改善土壤氮素', biomass: 20, permanent: true },
            sweetPotato: { id: 'sweetPotato', name: '地瓜葉 (覆蓋)', icon: '🍃', cost: 20, syntropy: 5, growth: 3, provides: ['ground_cover'], minSyntropy: 0, desc: '地表守護者：壓制雜草，保持熵減', biomass: 10, permanent: true },
            ginger: { id: 'ginger', name: '薑黃 (耐陰)', icon: '🍠', cost: 30, syntropy: 20, growth: 8, needs: ['shade'], minSyntropy: 20, desc: '演替伴生種：需在大樹遮蔭下', biomass: 180, permanent: false }
        };

        function App() {
            const [showTutorial, setShowTutorial] = useState(true);
            const [isVictory, setIsVictory] = useState(false);
            const [biomass, setBiomass] = useState(2000); // 資金更名為生物量
            const [syntropy, setSyntropy] = useState(0);  // 碳匯更名為熵減值
            const [year, setYear] = useState(1);
            const [month, setMonth] = useState(1);
            const [ap, setAp] = useState(10);
            const [pulseIndex, setPulseIndex] = useState(null);
            
            const [grid, setGrid] = useState(() => 
                Array(36).fill(null).map(() => ({
                    content: null,
                    type: Math.random() > 0.9 ? 'gravel' : 'normal'
                }))
            );
            
            const [selectedCrop, setSelectedCrop] = useState('pigeonPea');
            const [logs, setLogs] = useState(['趨合演替開始：請先種植先驅植物。']);

            // 計算系統穩定度 (熵減程度)
            useEffect(() => {
                const activeTypes = new Set(grid.filter(c => c.content && !c.content.isWeed).map(c => c.content.id));
                const diversityScore = Math.round((activeTypes.size / Object.keys(CROPS).size) * 100);
                if (diversityScore >= 100) setIsVictory(true);
            }, [grid]);

            const getNeighbors = (index) => {
                const res = [], x = index % 6, y = Math.floor(index / 6);
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < 6 && ny >= 0 && ny < 6) res.push(ny * 6 + nx);
                    }
                }
                return res;
            };

            const handleNextMonth = () => {
                let nm = month + 1, ny = year;
                if (nm > 12) { nm = 1; ny++; }
                
                const newGrid = grid.map((cell, i) => {
                    const neighbors = getNeighbors(i);
                    const neighborContents = neighbors.map(ni => grid[ni].content).filter(Boolean);
                    
                    if (cell.content?.isWeed) {
                        if (neighborContents.some(nc => nc.provides?.includes('ground_cover'))) return { ...cell, content: null };
                        return cell; 
                    }
                    if (!cell.content) {
                        if (Math.random() > 0.96) return { ...cell, content: { name: '雜草', icon: '🌾', isWeed: true } };
                        return cell;
                    }

                    let boost = 1;
                    if (neighborContents.some(nc => nc.provides?.includes('nitrogen'))) boost += 1;
                    if (cell.content.needs?.includes('shade') && neighborContents.some(nc => nc.provides?.includes('shade'))) boost += 1;
                    
                    const nextAge = (cell.content.age || 0) + boost;
                    return { ...cell, content: { ...cell.content, age: Math.max(0, nextAge), isMature: nextAge >= cell.content.growth } };
                });

                setGrid(newGrid); setMonth(nm); setYear(ny);
                setAp(Math.min(20, ap + 10)); 
                addLog(`進入 ${ny} 年 ${nm} 月。能量已補充。`);
            };

            const handleCellClick = (i) => {
                const cell = grid[i];
                if (ap <= 0) return;
                
                if (!cell.content || cell.content.isWeed) {
                    const crop = CROPS[selectedCrop];
                    if (biomass < crop.cost) { addLog("⚠️ 生物量不足以啟動演替！"); return; }
                    if (syntropy < (crop.minSyntropy || 0)) {
                        addLog(`⚠️ 土壤熵減值不足！${crop.name} 需要更多先驅植物改良。`); return;
                    }
                    
                    const newGrid = [...grid];
                    newGrid[i].content = { ...crop, age: 0, isMature: false };
                    setGrid(newGrid); setBiomass(b => b - crop.cost); setAp(a => a - 1);
                    addLog(`🌱 啟動演替：種下 ${crop.name}`);
                } 
                else if (cell.content.isMature) {
                    // 修枝脈衝邏輯 (Pruning Pulse)
                    const bonusBiomass = cell.content.biomass || 0;
                    setBiomass(b => b + bonusBiomass);
                    setSyntropy(s => s + (cell.content.syntropy || 0));
                    
                    // 觸發周圍生長脈衝
                    setPulseIndex(i);
                    setTimeout(() => setPulseIndex(null), 600);
                    
                    const neighbors = getNeighbors(i);
                    const newGrid = [...grid];
                    
                    neighbors.forEach(ni => {
                        if (newGrid[ni].content && !newGrid[ni].content.isMature) {
                            newGrid[ni].content.age += 5; // 修枝脈衝加速周圍生長
                        }
                    });

                    if (cell.content.permanent) {
                        newGrid[i].content = { ...cell.content, age: 0, isMature: false };
                        addLog(`✂️ 修枝脈衝：釋放生物量並刺激周邊生長！`);
                    } else {
                        newGrid[i].content = null;
                        addLog(`🧺 演替循環：收穫地下質並還原空間。`);
                    }
                    setGrid(newGrid); setAp(a => a - 1);
                }
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 8));

            return (
                <div className="h-screen w-screen flex flex-col md:flex-row relative bg-[#0d0f0d]">
                    
                    {/* 勝利畫面 */}
                    {isVictory && (
                        <div className="victory-overlay fixed inset-0 flex items-center justify-center p-4">
                            <div className="bg-[#1e291e] border-4 border-green-500 rounded-[3rem] p-12 max-w-2xl w-full text-center">
                                <h2 className="text-5xl font-black text-green-400 mb-4 text-shadow-glow">演替達成！</h2>
                                <p className="text-xl text-slate-400 mb-8">你成功引導土地進入「豐盛階段」。</p>
                                <div className="text-6xl font-black text-white mb-10">{year} <span className="text-2xl">Y</span> {month} <span className="text-2xl">M</span></div>
                                <button onClick={() => window.location.reload()} className="w-full bg-green-600 py-6 rounded-3xl text-2xl font-black text-white">重啟演替循環 🔄</button>
                            </div>
                        </div>
                    )}

                    {showTutorial && (
                        <div className="tutorial-overlay fixed inset-0 flex items-center justify-center p-4">
                            <div className="bg-[#1e291e] border-2 border-green-900/50 rounded-[3rem] p-10 max-w-3xl w-full">
                                <h2 className="text-3xl font-black text-green-400 mb-6 text-center italic">什麼是趨合農法？ (Syntropy)</h2>
                                <div className="space-y-4 text-slate-300">
                                    <div className="bg-green-950/50 p-6 rounded-3xl border border-green-800">
                                        <h3 className="text-green-300 font-bold mb-2">⚡ 修枝脈衝 (Pruning Pulse)</h3>
                                        <p className="text-sm">在趨合農法中，修剪不只是為了收成。當你點擊「成熟」植物，會觸發**生長脈衝**，瞬間加速周圍 8 格植物的生長！</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-sm font-bold">
                                        <div className="p-4 bg-white/5 rounded-2xl">🌿 先種植先驅：累積土壤熵減值</div>
                                        <div className="p-4 bg-white/5 rounded-2xl">🌳 後種植優勢：熵減值達標才可種植</div>
                                    </div>
                                    <p className="text-center text-xs text-slate-500 mt-4 tracking-widest">能量不是被消耗，而是被組織化。目標：100% 熵減演替。</p>
                                </div>
                                <button onClick={() => setShowTutorial(false)} className="mt-8 w-full bg-green-700 py-5 rounded-3xl text-2xl font-black text-white">進入演替現場 🚀</button>
                            </div>
                        </div>
                    )}

                    <aside className="w-full md:w-96 glass-panel border-b md:border-r border-green-900/30 flex flex-col z-10">
                        <div className="p-8 bg-gradient-to-br from-green-950 to-black">
                            <h1 className="text-4xl font-black text-green-400 tracking-tighter italic uppercase">Syntropy</h1>
                            <p className="text-[10px] text-green-700 font-black tracking-[0.4em]">趨合生態模擬器</p>
                        </div>
                        
                        <div className="p-6 space-y-4">
                            <div className="bg-black/40 p-5 rounded-2xl border border-green-900/50">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-[10px] font-black text-green-600 uppercase">土壤熵減值 (Syntropy)</span>
                                    <span className="text-lg font-black text-green-400">{syntropy}</span>
                                </div>
                                <div className="h-2 w-full bg-green-950 rounded-full overflow-hidden">
                                    <div className="h-full bg-green-400 progress-bar" style={{ width: `${Math.min(100, (syntropy/200)*100)}%` }}></div>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-3 text-center">
                                <div className="bg-black/40 p-3 rounded-2xl border border-white/5">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase">現存生物量</div>
                                    <div className="text-2xl font-black text-amber-500">{biomass}</div>
                                </div>
                                <div className="bg-black/40 p-3 rounded-2xl border border-white/5">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase">演替時間</div>
                                    <div className="text-lg font-black text-white italic">Y{year} M{month}</div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 hidden md:block">
                            <div className="space-y-2">
                                {Object.values(CROPS).map(crop => {
                                    const isLocked = syntropy < (crop.minSyntropy || 0);
                                    return (
                                        <button key={crop.id} onClick={() => !isLocked && setSelectedCrop(crop.id)}
                                            className={`w-full p-4 rounded-2xl border-2 transition-all flex items-center gap-4 relative overflow-hidden
                                            ${isLocked ? 'opacity-30 grayscale cursor-not-allowed border-transparent bg-white/5' : 
                                            (selectedCrop === crop.id ? 'border-green-500 bg-green-500/10' : 'border-transparent bg-white/5 hover:bg-white/10')}`}>
                                            <span className="text-3xl">{crop.icon}</span>
                                            <div className="text-left leading-tight">
                                                <div className="font-black text-white text-base">{crop.name}</div>
                                                <div className="text-[9px] text-slate-400 mt-1">{crop.desc}</div>
                                                {isLocked && <div className="text-[10px] font-black text-red-500 mt-1 uppercase tracking-tighter">需熵減值達 {crop.minSyntropy}</div>}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col p-6 items-center justify-center relative">
                        {/* 能量槽 */}
                        <div className="w-full max-w-lg mb-8">
                            <div className="flex justify-between items-end mb-2 font-black">
                                <span className="text-xs text-green-700 tracking-widest uppercase">運作能量 (AP)</span>
                                <span className="text-xl text-green-400">{ap} / 20</span>
                            </div>
                            <div className="h-2 w-full bg-green-950/30 rounded-full border border-green-900/50">
                                <div className="h-full bg-green-500 progress-bar shadow-[0_0_15px_rgba(74,222,128,0.5)]" style={{ width: `${(ap / 20) * 100}%` }}></div>
                            </div>
                        </div>

                        <div className="farm-grid">
                            {grid.map((cell, i) => (
                                <div key={i} onClick={() => handleCellClick(i)}
                                    className={`cell-aspect rounded-2xl cursor-pointer flex flex-col items-center justify-center relative shadow-xl transition-all active:scale-90
                                    ${pulseIndex === i ? 'pulse-active' : ''}
                                    ${cell.type === 'gravel' ? 'border-orange-900/50 bg-orange-950/10' : 'border-white/5 bg-white/5 hover:bg-white/10'}`}>
                                    
                                    {cell.content ? (
                                        <>
                                            <span className={`text-4xl md:text-5xl animate-pop ${cell.content.isMature ? 'animate-bounce drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]' : 'opacity-80'}`}>
                                                {cell.content.isWeed ? '🌾' : (cell.content.isMature ? cell.content.icon : '🌱')}
                                            </span>
                                            {!cell.content.isMature && !cell.content.isWeed && (
                                                <div className="absolute bottom-2 w-3/4 h-1 bg-white/10 rounded-full">
                                                    <div className="h-full bg-green-500" style={{ width: `${Math.min(100, (cell.content.age / cell.content.growth) * 100)}%` }}></div>
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <div className="text-[10px] text-white/5 font-black uppercase">{cell.type === 'gravel' ? 'Gravel' : ''}</div>
                                    )}
                                </div>
                            ))}
                        </div>

                        <button onClick={handleNextMonth} className="mt-10 w-full max-w-lg bg-green-900/20 border border-green-500/30 text-green-400 py-6 rounded-3xl font-black text-2xl hover:bg-green-900/40 active:scale-95 transition-all">
                            📅 下一個演替週期
                        </button>
                    </main>

                    {/* 日誌面板 */}
                    <div className="fixed bottom-6 right-6 w-80 pointer-events-none z-50">
                        <div className="bg-black/90 backdrop-blur-xl p-6 rounded-[2rem] border border-white/10 shadow-2xl">
                            <p className="text-green-800 text-[10px] font-black mb-3 tracking-widest uppercase italic">Syntropy Log</p>
                            <div className="space-y-1">
                                {logs.map((log, i) => (
                                    <div key={i} className={`text-xs font-bold animate-pop leading-tight ${log.includes('✂️') ? 'text-yellow-400' : 'text-green-500/80'}`}>
                                        {log}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
