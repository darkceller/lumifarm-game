<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食物森林：尋光模擬器 Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f0; margin: 0; overflow-x: hidden; touch-action: manipulation; }
        .farm-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; width: 100%; max-width: 600px; }
        .cell-aspect { aspect-ratio: 1 / 1; transition: all 0.2s; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .progress-bar { transition: width 0.5s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 食物森林作物數據 ---
        const CROPS = {
            mango: { id: 'mango', name: '芒果(冠層)', icon: '🌳', cost: 80, carbon: 100, growth: 18, provides: ['shade'], layer: '1', desc: '巨大的遮蔭來源' },
            banana: { id: 'banana', name: '香蕉(低木)', icon: '🍌', cost: 40, carbon: 30, growth: 8, provides: ['moisture'], layer: '2', desc: '生物量大，可保濕' },
            pigeonPea: { id: 'pigeonPea', name: '樹豆(灌木)', icon: '🌿', cost: 20, carbon: 15, growth: 4, provides: ['nitrogen'], layer: '3', desc: '固氮能手，加速生長' },
            sweetPotato: { id: 'sweetPotato', name: '地瓜葉(地被)', icon: '🍃', cost: 10, carbon: 5, growth: 2, provides: ['ground_cover'], layer: '5', desc: '防止雜草與乾旱' },
            ginger: { id: 'ginger', name: '薑黃(地下)', icon: '🍠', cost: 15, carbon: 10, growth: 6, needs: ['shade'], layer: '6', money: 120, desc: '喜歡在大樹下生長' },
            taro: { id: 'taro', name: '芋頭(地下)', icon: '🥔', cost: 20, carbon: 10, growth: 5, soil_pref: 'wetland', layer: '6', money: 150, desc: '喜歡低窪潮濕地' }
        };

        function App() {
            const [money, setMoney] = useState(300);
            const [carbon, setCarbon] = useState(0);
            const [year, setYear] = useState(1);
            const [month, setMonth] = useState(1);
            const [ap, setAp] = useState(10);
            const [weather, setWeather] = useState('正常');
            
            // 初始化土地：隨機生成屬性
            const [grid, setGrid] = useState(() => 
                Array(36).fill(null).map(() => ({
                    content: null,
                    type: Math.random() > 0.85 ? 'gravel' : (Math.random() < 0.1 ? 'wetland' : 'normal')
                }))
            );
            
            const [selectedCrop, setSelectedCrop] = useState('mango');
            const [logs, setLogs] = useState(['歡迎來到食物森林！請利用體力(AP)與資金開始種植。']);

            // 核心逻辑：計算周圍影響
            const getNeighbors = (index) => {
                const res = [];
                const x = index % 6;
                const y = Math.floor(index / 6);
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < 6 && ny >= 0 && ny < 6) res.push(ny * 6 + nx);
                    }
                }
                return res;
            };

            const handleNextMonth = () => {
                let nm = month + 1;
                let ny = year;
                if (nm > 12) { nm = 1; ny++; }

                // 隨機事件：乾旱判定
                const isDrought = Math.random() > 0.85;
                setWeather(isDrought ? '☀️ 嚴重乾旱' : '正常');

                const newGrid = grid.map((cell, i) => {
                    if (!cell.content) {
                        // 雜草生長：空地且沒地瓜葉保護時，機率長雜草
                        if (Math.random() > 0.92) return { ...cell, content: { name: '雜草', icon: '🌾', isWeed: true } };
                        return cell;
                    }
                    if (cell.content.isWeed) return cell;

                    // 生態計算
                    const neighbors = getNeighbors(i);
                    let growthBoost = 1;
                    const neighborCrops = neighbors.map(ni => grid[ni].content).filter(Boolean);

                    if (neighborCrops.some(nc => nc.provides?.includes('nitrogen'))) growthBoost += 1;
                    if (cell.content.needs?.includes('shade') && neighborCrops.some(nc => nc.provides?.includes('shade'))) growthBoost += 1;
                    
                    // 乾旱懲罰
                    if (isDrought && !neighborCrops.some(nc => nc.provides?.includes('ground_cover'))) {
                        growthBoost -= 2;
                    }

                    const nextAge = cell.content.age + growthBoost;
                    return { 
                        ...cell, 
                        content: { ...cell.content, age: Math.max(0, nextAge), isMature: nextAge >= cell.content.growth } 
                    };
                });

                setGrid(newGrid);
                setMonth(nm);
                setYear(ny);
                setAp(10);
                addLog(`進入 ${ny} 年 ${nm} 月，體力已恢復。`);
                if (isDrought) addLog("⚠️ 乾旱襲來！沒有地瓜葉保護的植物生長緩慢。");
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 5));

            const handleCellClick = (i) => {
                const cell = grid[i];
                if (ap <= 0) { addLog("❌ 體力不足！"); return; }

                // 如果是雜草或空地：種植
                if (!cell.content || cell.content.isWeed) {
                    const crop = CROPS[selectedCrop];
                    if (money < crop.cost) { addLog("💰 資金不足！"); return; }
                    if (crop.soil_pref && crop.soil_pref !== cell.type) {
                        addLog(`⚠️ ${crop.name} 需要 ${cell.type === 'wetland' ? '濕地' : '石礫地'}！`);
                        return;
                    }

                    const newGrid = [...grid];
                    newGrid[i].content = { ...crop, age: 0, isMature: false };
                    setGrid(newGrid);
                    setMoney(m => m - crop.cost);
                    setAp(a => a - 1);
                    addLog(`🌱 種下了 ${crop.name}。`);
                } 
                // 成熟收割
                else if (cell.content.isMature) {
                    setMoney(m => m + (cell.content.money || 0));
                    setCarbon(c => c + cell.content.carbon);
                    const newGrid = [...grid];
                    newGrid[i].content = null;
                    setGrid(newGrid);
                    setAp(a => a - 1);
                    addLog(`🧺 收穫 ${cell.content.name}！碳匯 +${cell.content.carbon}`);
                }
            };

            return (
                <div className="h-screen w-screen flex flex-col md:flex-row overflow-hidden text-slate-800">
                    <aside className="w-full md:w-80 glass-panel border-b md:border-r flex flex-col z-20 shadow-xl">
                        <div className="p-6 bg-gradient-to-br from-green-700 to-emerald-900 text-white">
                            <h1 className="text-2xl font-bold mb-1">食物森林模擬器</h1>
                            <p className="text-green-100 text-xs opacity-80 uppercase tracking-widest">Food Forest Pro</p>
                        </div>

                        <div className="p-4 grid grid-cols-3 md:grid-cols-1 gap-3">
                            <div className="bg-white/50 p-3 rounded-xl border border-white">
                                <div className="text-xs text-slate-500 font-bold">資金</div>
                                <div className="text-xl font-black text-amber-600">${money}</div>
                            </div>
                            <div className="bg-white/50 p-3 rounded-xl border border-white">
                                <div className="text-xs text-slate-500 font-bold">累積碳匯</div>
                                <div className="text-xl font-black text-green-700">{carbon}</div>
                            </div>
                            <div className="bg-white/50 p-3 rounded-xl border border-white">
                                <div className="text-xs text-slate-500 font-bold">天氣: {weather}</div>
                                <div className="text-sm font-bold">Y{year} / M{month}</div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 hidden md:block">
                            <h3 className="text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">選擇層次植物</h3>
                            <div className="space-y-2">
                                {Object.values(CROPS).map(crop => (
                                    <button key={crop.id} onClick={() => setSelectedCrop(crop.id)}
                                        className={`w-full p-2 rounded-xl border-2 transition-all flex items-center gap-3 ${selectedCrop === crop.id ? 'border-green-500 bg-green-50' : 'border-transparent bg-white'}`}>
                                        <span className="text-2xl">{crop.icon}</span>
                                        <div className="text-left">
                                            <div className="font-bold text-xs">{crop.name}</div>
                                            <div className="text-[10px] text-slate-400">成本: ${crop.cost} | 層次: {crop.layer}</div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 relative flex flex-col p-4 items-center justify-center bg-[#e8ede8]">
                        <div className="w-full max-w-md mb-4 px-4">
                            <div className="flex justify-between mb-1 text-sm font-bold">
                                <span>⚡ 體力 (AP)</span>
                                <span>{ap} / 10</span>
                            </div>
                            <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                                <div className="h-full bg-blue-500 progress-bar" style={{ width: `${ap * 10}%` }}></div>
                            </div>
                        </div>

                        <div className="farm-grid">
                            {grid.map((cell, i) => (
                                <div key={i} onClick={() => handleCellClick(i)}
                                    className={`cell-aspect rounded-lg cursor-pointer flex flex-col items-center justify-center relative shadow-sm border-2 
                                    ${cell.type === 'gravel' ? 'border-orange-300 bg-orange-50' : cell.type === 'wetland' ? 'border-blue-200 bg-blue-50' : 'border-white bg-white/60'}`}>
                                    {cell.content ? (
                                        <>
                                            <span className={`text-2xl md:text-4xl animate-pop ${cell.content.isMature ? 'animate-bounce' : ''}`}>
                                                {cell.content.isWeed ? '🌾' : (cell.content.isMature ? cell.content.icon : '🌱')}
                                            </span>
                                            {!cell.content.isMature && !cell.content.isWeed && (
                                                <div className="absolute bottom-1 w-3/4 h-1 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-green-400" style={{ width: `${Math.min(100, (cell.content.age / cell.content.growth) * 100)}%` }}></div>
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <span className="text-[10px] text-slate-300 opacity-20">{cell.type === 'gravel' ? '石' : cell.type === 'wetland' ? '水' : ''}</span>
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="md:hidden flex gap-2 overflow-x-auto w-full mt-4 p-2">
                                {Object.values(CROPS).map(crop => (
                                    <button key={crop.id} onClick={() => setSelectedCrop(crop.id)} className={`flex-shrink-0 px-3 py-1 rounded-full border-2 text-xs font-bold ${selectedCrop === crop.id ? 'bg-green-600 text-white' : 'bg-white'}`}>
                                        {crop.icon} {crop.name}
                                    </button>
                                ))}
                        </div>

                        <button onClick={handleNextMonth} className="mt-6 w-full max-w-md bg-slate-800 text-white py-3 rounded-xl font-bold text-lg shadow-xl active:scale-95 transition-transform">
                            📅 進入下個月
                        </button>
                    </main>

                    <div className="fixed top-4 right-4 w-64 pointer-events-none hidden md:block">
                        {logs.map((log, i) => (
                            <div key={i} className="bg-white/90 p-2 rounded shadow mb-2 border-l-4 border-green-500 text-[10px] font-bold animate-pop">{log}</div>
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
