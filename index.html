<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋光農場 - 穩定防崩潰版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #f5f5f4;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #root {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        @keyframes float-down {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        @keyframes pulse-fade {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script>
        // 全域錯誤捕捉，讓玩家可以手動排除錯誤
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('root').innerHTML = `
                <div style="color:#b91c1c; background:#fef2f2; padding:20px; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
                    <h2 style="font-size:1.5rem; font-weight:bold; margin-bottom:10px;">⚠️ 遊戲載入異常</h2>
                    <p style="margin-bottom:20px;">這可能是由於瀏覽器阻擋或快取錯誤導致。<br/>錯誤訊息: ${message}</p>
                    <button onclick="localStorage.removeItem('lsFarmScores'); window.location.reload();" style="background:#b91c1c; color:white; padding:12px 24px; border-radius:8px; border:none; font-weight:bold; font-size:1rem; cursor:pointer;">
                        點擊此處修復並重新載入
                    </button>
                </div>
            `;
            return true;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 安全的 LocalStorage 存取機制 (防崩潰核心) ---
        const safeGetStorage = (key) => {
            try { return localStorage.getItem(key); } catch (e) { return null; }
        };
        const safeSetStorage = (key, value) => {
            try { localStorage.setItem(key, value); } catch (e) { console.warn("瀏覽器阻擋了儲存功能"); }
        };
