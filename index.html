<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食物森林：尋光模擬器 Pro v2.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f0; margin: 0; overflow: hidden; }
        .farm-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 100%; max-width: 650px; }
        .cell-aspect { aspect-ratio: 1 / 1; transition: all 0.2s; border-width: 3px; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s ease-out; }
        .tutorial-overlay { background: rgba(0,0,0,0.85); z-index: 100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CROPS = {
            mango: { id: 'mango', name: '芒果(冠層)', icon: '🌳', cost: 80, carbon: 100, growth: 18, provides: ['shade'], layer: '1', desc: '大樹，提供遮蔭' },
            banana: { id: 'banana', name: '香蕉(低木)', icon: '🍌', cost: 40, carbon: 30, growth: 8, provides: ['moisture'], layer: '2', desc: '保濕，抵禦乾旱' },
            pigeonPea: { id: 'pigeonPea', name: '樹豆(灌木)', icon: '🌿', cost: 20, carbon: 15, growth: 4, provides: ['nitrogen'], layer: '3', desc: '固氮，加速生長' },
            sweetPotato: { id: 'sweetPotato', name: '地瓜葉(地被)', icon: '🍃', cost: 10, carbon: 5, growth: 2, provides: ['ground_cover'], layer: '5', desc: '覆蓋地面防止雜草' },
            ginger: { id: 'ginger', name: '薑黃(地下)', icon: '🍠', cost: 15, carbon: 10, growth: 6, needs: ['shade'], layer: '6', money: 120, desc: '需在大樹旁種植' },
            taro: { id: 'taro', name: '芋頭(地下)', icon: '🥔', cost: 20, carbon: 10, growth: 5, soil_pref: 'wetland', layer: '6', money: 150, desc: '需種在藍色濕地' }
        };

        function App() {
            const [showTutorial, setShowTutorial] = useState(true);
            const [money, setMoney] = useState(300);
            const [carbon, setCarbon] = useState(0);
            const [year, setYear] = useState(1);
            const [month, setMonth] = useState(1);
            const [ap, setAp] = useState(10);
            const [weather, setWeather] = useState('正常');
            const [grid, setGrid] = useState(() => 
                Array(36).fill(null).map(() => ({
                    content: null,
                    type: Math.random() > 0.85 ? 'gravel' : (Math.random() < 0.1 ? 'wetland' : 'normal')
                }))
            );
            const [selectedCrop, setSelectedCrop] = useState('mango');
            const [logs, setLogs] = useState(['歡迎來到食物森林！']);

            const getNeighbors = (index) => {
                const res = [], x = index % 6, y = Math.floor(index / 6);
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < 6 && ny >= 0 && ny < 6) res.push(ny * 6 + nx);
                    }
                }
                return res;
            };

            const handleNextMonth = () => {
                let nm = month + 1, ny = year;
                if (nm > 12) { nm = 1; ny++; }
                const isDrought = Math.random() > 0.85;
                setWeather(isDrought ? '☀️ 嚴重乾旱' : '正常');

                const newGrid = grid.map((cell, i) => {
                    if (!cell.content) {
                        if (Math.random() > 0.92) return { ...cell, content: { name: '雜草', icon: '🌾', isWeed: true } };
                        return cell;
                    }
                    if (cell.content.isWeed) return cell;

                    const neighbors = getNeighbors(i);
                    let boost = 1;
                    const neighborCrops = neighbors.map(ni => grid[ni].content).filter(Boolean);
                    if (neighborCrops.some(nc => nc.provides?.includes('nitrogen'))) boost += 1;
                    if (cell.content.needs?.includes('shade') && neighborCrops.some(nc => nc.provides?.includes('shade'))) boost += 1;
                    if (isDrought && !neighborCrops.some(nc => nc.provides?.includes('ground_cover'))) boost -= 2;

                    const nextAge = cell.content.age + boost;
                    return { ...cell, content: { ...cell.content, age: Math.max(0, nextAge), isMature: nextAge >= cell.content.growth } };
                });

                setGrid(newGrid); setMonth(nm); setYear(ny); setAp(10);
                addLog(`進入 ${ny} 年 ${nm} 月，體力已恢復。`);
                if (isDrought) addLog("⚠️ 乾旱襲來！請檢查地被覆蓋。");
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 8));

            const handleCellClick = (i) => {
                const cell = grid[i];
                if (ap <= 0) { addLog("❌ 體力不足！"); return; }
                if (!cell.content || cell.content.isWeed) {
                    const crop = CROPS[selectedCrop];
                    if (money < crop.cost) { addLog("💰 資金不足！"); return; }
                    if (crop.soil_pref && crop.soil_pref !== cell.type) {
                        addLog(`⚠️ ${crop.name} 需要${cell.type === 'wetland' ? '濕地' : '特殊土地'}！`);
                        return;
                    }
                    const newGrid = [...grid];
                    newGrid[i].content = { ...crop, age: 0, isMature: false };
                    setGrid(newGrid); setMoney(m => m - crop.cost); setAp(a => a - 1);
                    addLog(`🌱 種下了 ${crop.name}。`);
                } else if (cell.content.isMature) {
                    setMoney(m => m + (cell.content.money || 0));
                    setCarbon(c => c + cell.content.carbon);
                    const newGrid = [...grid]; newGrid[i].content = null; setGrid(newGrid); setAp(a => a - 1);
                    addLog(`🧺 收穫 ${cell.content.name}！`);
                }
            };

            return (
                <div className="h-screen w-screen flex flex-col md:flex-row text-slate-800 relative">
                    {/* 新手教學彈窗 */}
                    {showTutorial && (
                        <div className="tutorial-overlay fixed inset-0 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full animate-pop shadow-2xl">
                                <h2 className="text-4xl font-black text-green-700 mb-6 flex items-center gap-2">🌿 如何打造食物森林？</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-lg leading-relaxed">
                                    <div className="space-y-4">
                                        <p className="font-bold text-slate-600">土地屬性說明：</p>
                                        <div className="flex items-center gap-3"><div className="w-8 h-8 bg-blue-100 border-2 border-blue-400 rounded"></div> <span><b>藍色(濕地)</b>：適合種芋頭</span></div>
                                        <div className="flex items-center gap-3"><div className="w-8 h-8 bg-orange-100 border-2 border-orange-400 rounded"></div> <span><b>橘色(石礫)</b>：挑戰性地形</span></div>
                                        <div className="flex items-center gap-3"><div className="w-8 h-8 bg-white/60 border-2 border-slate-200 rounded"></div> <span><b>一般</b>：適合大部分作物</span></div>
                                    </div>
                                    <div className="space-y-4">
                                        <p className="font-bold text-slate-600">共生規則：</p>
                                        <ul className="list-disc list-inside">
                                            <li><b>樹豆</b>：提供氮肥，加速周邊生長</li>
                                            <li><b>大樹</b>：提供遮蔭，薑黃長更快</li>
                                            <li><b>地瓜葉</b>：覆蓋土地，抵抗乾旱</li>
                                        </ul>
                                    </div>
                                </div>
                                <button onClick={() => setShowTutorial(false)} className="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl text-2xl font-black shadow-lg">開始模擬 🚀</button>
                            </div>
                        </div>
                    )}

                    {/* 左側面板 - 標題加大 */}
                    <aside className="w-full md:w-96 glass-panel border-b md:border-r flex flex-col shadow-2xl z-10">
                        <div className="p-8 bg-gradient-to-br from-green-800 to-emerald-950 text-white">
                            <h1 className="text-5xl font-black mb-2 tracking-tighter">食物森林</h1>
                            <p className="text-green-300 text-sm font-bold tracking-[0.2em] opacity-80">FOOD FOREST SIMULATOR</p>
                        </div>
                        <div className="p-6 grid grid-cols-3 md:grid-cols-1 gap-4">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-100">
                                <div className="text-sm font-bold text-slate-400">資金可用</div>
                                <div className="text-3xl font-black text-amber-600">${money}</div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-100">
                                <div className="text-sm font-bold text-slate-400">總碳匯量</div>
                                <div className="text-3xl font-black text-green-700">{carbon}</div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-100">
                                <div className="text-sm font-bold text-slate-400">天氣: <span className="text-red-500">{weather}</span></div>
                                <div className="text-xl font-black">Y{year} M{month}</div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 hidden md:block">
                            <p className="text-xs font-black text-slate-400 mb-4 tracking-widest uppercase">選擇作物層次</p>
                            <div className="space-y-3">
                                {Object.values(CROPS).map(crop => (
                                    <button key={crop.id} onClick={() => setSelectedCrop(crop.id)}
                                        className={`w-full p-4 rounded-2xl border-4 transition-all flex items-center gap-4 ${selectedCrop === crop.id ? 'border-green-600 bg-green-50 scale-[1.02]' : 'border-transparent bg-white hover:bg-slate-50'}`}>
                                        <span className="text-4xl">{crop.icon}</span>
                                        <div className="text-left">
                                            <div className="font-black text-lg leading-tight">{crop.name}</div>
                                            <div className="text-xs font-bold text-slate-400 mt-1">成本: ${crop.cost} | {crop.desc}</div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </aside>

                    {/* 中央農場 */}
                    <main className="flex-1 flex flex-col p-6 items-center justify-center bg-[#e8ede8] relative">
                        <div className="w-full max-w-lg mb-8">
                            <div className="flex justify-between items-end mb-2 font-black">
                                <span className="text-xl text-slate-600">⚡ 體力 (AP)</span>
                                <span className="text-2xl text-blue-600">{ap} / 10</span>
                            </div>
                            <div className="h-4 w-full bg-slate-200 rounded-full overflow-hidden shadow-inner">
                                <div className="h-full bg-blue-500 progress-bar shadow-[0_0_10px_rgba(59,130,246,0.5)]" style={{ width: `${ap * 10}%` }}></div>
                            </div>
                        </div>

                        <div className="farm-grid">
                            {grid.map((cell, i) => (
                                <div key={i} onClick={() => handleCellClick(i)}
                                    className={`cell-aspect rounded-2xl cursor-pointer flex flex-col items-center justify-center relative shadow-md
                                    ${cell.type === 'gravel' ? 'border-orange-400 bg-orange-50' : cell.type === 'wetland' ? 'border-blue-400 bg-blue-50' : 'border-white bg-white/60 hover:bg-white'}`}>
                                    
                                    {/* 土地屬性標籤 */}
                                    {!cell.content && (
                                        <div className="text-[10px] font-black opacity-30 uppercase tracking-tighter">
                                            {cell.type === 'gravel' ? '石礫地' : cell.type === 'wetland' ? '濕地' : ''}
                                        </div>
                                    )}

                                    {cell.content ? (
                                        <>
                                            <span className={`text-4xl md:text-5xl animate-pop ${cell.content.isMature ? 'animate-bounce' : ''}`}>
                                                {cell.content.isWeed ? '🌾' : (cell.content.isMature ? cell.content.icon : '🌱')}
                                            </span>
                                            {!cell.content.isMature && !cell.content.isWeed && (
                                                <div className="absolute bottom-2 w-3/4 h-2 bg-slate-200/50 rounded-full overflow-hidden">
                                                    <div className="h-full bg-green-500" style={{ width: `${Math.min(100, (cell.content.age / cell.content.growth) * 100)}%` }}></div>
                                                </div>
                                            )}
                                        </>
                                    ) : null}
                                </div>
                            ))}
                        </div>

                        <button onClick={handleNextMonth} className="mt-10 w-full max-w-lg bg-slate-900 text-white py-6 rounded-3xl font-black text-2xl shadow-2xl hover:bg-black active:scale-95 transition-all">
                            📅 下個月 (體力恢復)
                        </button>

                        {/* 手機版快速選單 */}
                        <div className="md:hidden flex gap-2 overflow-x-auto w-full mt-6 pb-2">
                                {Object.values(CROPS).map(crop => (
                                    <button key={crop.id} onClick={() => setSelectedCrop(crop.id)} className={`flex-shrink-0 px-4 py-2 rounded-2xl border-2 font-bold ${selectedCrop === crop.id ? 'bg-green-700 text-white' : 'bg-white'}`}>
                                        {crop.icon} {crop.name}
                                    </button>
                                ))}
                        </div>
                    </main>

                    {/* 右下角日誌 - 加大且更明顯 */}
                    <div className="fixed bottom-6 right-6 w-80 pointer-events-none z-50">
                        <div className="bg-slate-900/90 backdrop-blur-md p-6 rounded-3xl shadow-2xl border-2 border-white/20">
                            <p className="text-white/40 text-[10px] font-black mb-2 tracking-widest uppercase">系統日誌 System Logs</p>
                            {logs.map((log, i) => (
                                <div key={i} className={`text-sm md:text-base font-bold mb-1 animate-pop ${log.includes('❌') || log.includes('⚠️') ? 'text-red-400' : 'text-green-400'}`}>
                                    • {log}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
