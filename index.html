<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食物森林：城市綠洲模擬器</title>
    <style>
        :root { --forest-green: #2d5a27; --dirt: #795548; --sun: #ffeb3b; }
        body { font-family: sans-serif; background: #f0f4f0; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--forest-green); }
        #game-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        
        /* 地圖網格 */
        #grid { display: grid; grid-template-columns: repeat(5, 60px); grid-template-rows: repeat(5, 60px); gap: 5px; background: var(--dirt); padding: 10px; border-radius: 8px; }
        .cell { width: 60px; height: 60px; background: #8d6e63; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: 0.3s; }
        .cell:hover { background: #a1887f; }

        /* 植物選單 */
        #menu { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 250px; }
        .plant-option { padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
        .plant-option:hover { background: #e8f5e9; }
        .selected { border: 2px solid var(--forest-green); background: #e8f5e9; }

        /* 狀態列 */
        #status { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; width: 80%; max-width: 600px; }
        .score-box { font-size: 24px; font-weight: bold; color: var(--forest-green); }
    </style>
</head>
<body>

    <h1>🌿 食物森林：城市綠洲模擬器</h1>
    <p>點選右側植物，再點擊左側土地開始種植！</p>

    <div id="game-container">
        <div id="grid"></div>

        <div id="menu">
            <h3>選擇植物</h3>
            <div id="plant-list"></div>
        </div>
    </div>

    <div id="status">
        <div class="score-box">目前森林健康值: <span id="total-score">0</span></div>
        <div id="log">點擊土地來建立你的生態系...</div>
    </div>

    <script>
        // 1. 植物資料庫 (從 JSON 簡化而來)
        const plants = [
            { id: "mango", name: "芒果", emoji: "🌳", layer: 1, provides: ["shade"], needs: ["sun"] },
            { id: "pigeon_pea", name: "樹豆", emoji: "🌿", layer: 3, provides: ["nitrogen"], needs: ["sun"] },
            { id: "turmeric", name: "薑黃", emoji: "🍠", layer: 6, provides: [], needs: ["shade"] },
            { id: "sweet_potato", name: "地瓜葉", emoji: "🍃", layer: 5, provides: ["ground_cover"], needs: ["shade"] }
        ];

        let selectedPlant = null;
        let gardenData = []; // 存儲地圖上已種植的植物 {x, y, plantId}

        // 2. 初始化選單
        const menuEl = document.getElementById('plant-list');
        plants.forEach(p => {
            const div = document.createElement('div');
            div.className = 'plant-option';
            div.innerHTML = `${p.emoji} ${p.name} (層次 ${p.layer})`;
            div.onclick = () => {
                document.querySelectorAll('.plant-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedPlant = p;
            };
            menuEl.appendChild(div);
        });

        // 3. 初始化地圖 (5x5)
        const gridEl = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const x = i % 5;
            const y = Math.floor(i / 5);
            cell.onclick = () => plantInCell(x, y, cell);
            gridEl.appendChild(cell);
        }

        // 4. 種植邏輯
        function plantInCell(x, y, cell) {
            if (!selectedPlant) { alert("請先選擇一種植物！"); return; }
            if (cell.innerHTML !== "") return; // 已有植物

            cell.innerHTML = selectedPlant.emoji;
            const newPlant = { x, y, ...selectedPlant };
            gardenData.push(newPlant);
            updateGame();
        }

        // 5. 更新分數與回饋
        function updateGame() {
            let totalScore = 0;
            let logMessages = [];

            gardenData.forEach(p => {
                let synergy = 0;
                // 檢查周圍植物
                gardenData.forEach(other => {
                    if (p === other) return;
                    const dist = Math.sqrt(Math.pow(p.x - other.x, 2) + Math.pow(p.y - other.y, 2));
                    
                    if (dist <= 1.5) { // 鄰近格
                        if (p.needs.includes("shade") && other.provides.includes("shade")) {
                            synergy += 20;
                            logMessages.push(`✨ ${p.name} 感謝 ${other.name} 提供的遮蔭！`);
                        }
                        if (other.provides.includes("nitrogen")) {
                            synergy += 15;
                            logMessages.push(`💪 ${other.name} 正在幫周圍固氮！`);
                        }
                    }
                });
                totalScore += synergy;
            });

            document.getElementById('total-score').innerText = totalScore;
            const logEl = document.getElementById('log');
            logEl.innerHTML = logMessages.length > 0 ? logMessages.slice(-3).join("<br>") : "森林正在緩慢成長中...";
        }
    </script>
</body>
</html>
