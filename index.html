<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食物森林：100% 生態挑戰賽</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f0; margin: 0; overflow: hidden; }
        .farm-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 100%; max-width: 650px; }
        .cell-aspect { aspect-ratio: 1 / 1; transition: all 0.2s; border-width: 3px; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s ease-out; }
        .tutorial-overlay { background: rgba(0,0,0,0.9); z-index: 100; }
        .victory-overlay { background: rgba(0, 100, 0, 0.95); z-index: 200; }
        .progress-bar { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CROPS = {
            mango: { id: 'mango', name: '芒果(冠層)', icon: '🌳', cost: 80, carbon: 100, growth: 18, provides: ['shade'], layer: '1', desc: '巨型雨傘：為下層植物擋住烈日' },
            banana: { id: 'banana', name: '香蕉(低木)', icon: '🍌', cost: 40, carbon: 30, growth: 8, provides: ['moisture'], layer: '2', desc: '蓄水水庫：讓土壤保持濕潤' },
            pigeonPea: { id: 'pigeonPea', name: '樹豆(灌木)', icon: '🌿', cost: 20, carbon: 15, growth: 4, provides: ['nitrogen'], layer: '3', desc: '天然肥料：免費讓周圍植物長更快' },
            sweetPotato: { id: 'sweetPotato', name: '地瓜葉(地被)', icon: '🍃', cost: 10, carbon: 5, growth: 2, provides: ['ground_cover'], layer: '5', desc: '活體護蓋：蓋住土地，雜草就長不出來' },
            ginger: { id: 'ginger', name: '薑黃(地下)', icon: '🍠', cost: 15, carbon: 10, growth: 6, needs: ['shade'], layer: '6', money: 120, desc: '害羞植物：喜歡躲在大樹影下生長' },
            taro: { id: 'taro', name: '芋頭(地下)', icon: '🥔', cost: 20, carbon: 10, growth: 5, soil_pref: 'wetland', layer: '6', money: 150, desc: '愛水植物：一定要種在藍色區域' }
        };

        function App() {
            const [showTutorial, setShowTutorial] = useState(true);
            const [isVictory, setIsVictory] = useState(false);
            const [money, setMoney] = useState(2000);
            const [carbon, setCarbon] = useState(0);
            const [year, setYear] = useState(1);
            const [month, setMonth] = useState(1);
            const [ap, setAp] = useState(10);
            const [weather, setWeather] = useState('正常');
            const [stability, setStability] = useState(0);
            
            const [grid, setGrid] = useState(() => 
                Array(36).fill(null).map(() => ({
                    content: null,
                    type: Math.random() > 0.85 ? 'gravel' : (Math.random() < 0.1 ? 'wetland' : 'normal')
                }))
            );
            
            const [selectedCrop, setSelectedCrop] = useState('mango');
            const [logs, setLogs] = useState(['挑戰開始！請達成 100% 穩定度。']);

            useEffect(() => {
                const activeTypes = new Set(grid.filter(c => c.content && !c.content.isWeed).map(c => c.content.id));
                const score = Math.round((activeTypes.size / Object.keys(CROPS).size) * 100);
                setStability(score);
                if (score >= 100) setIsVictory(true);
            }, [grid]);

            const getNeighbors = (index) => {
                const res = [], x = index % 6, y = Math.floor(index / 6);
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < 6 && ny >= 0 && ny < 6) res.push(ny * 6 + nx);
                    }
                }
                return res;
            };

            const handleNextMonth = () => {
                let nm = month + 1, ny = year;
                if (nm > 12) { nm = 1; ny++; }
                const isDrought = Math.random() > 0.85;
                setWeather(isDrought ? '☀️ 嚴重乾旱' : '正常');

                const newGrid = grid.map((cell, i) => {
                    const neighbors = getNeighbors(i);
                    const neighborContents = neighbors.map(ni => grid[ni].content).filter(Boolean);
                    if (cell.content?.isWeed) {
                        if (neighborContents.some(nc => nc.provides?.includes('ground_cover'))) return { ...cell, content: null };
                        return cell; 
                    }
                    if (!cell.content) {
                        if (Math.random() > 0.94) return { ...cell, content: { name: '雜草', icon: '🌾', isWeed: true } };
                        return cell;
                    }
                    let boost = 1;
                    if (neighborContents.some(nc => nc.provides?.includes('nitrogen'))) boost += 1;
                    if (cell.content.needs?.includes('shade') && neighborContents.some(nc => nc.provides?.includes('shade'))) boost += 1;
                    if (isDrought && !neighborContents.some(nc => nc.provides?.includes('ground_cover'))) boost -= 2;
                    const nextAge = (cell.content.age || 0) + boost;
                    return { ...cell, content: { ...cell.content, age: Math.max(0, nextAge), isMature: nextAge >= cell.content.growth } };
                });

                setGrid(newGrid); setMonth(nm); setYear(ny);
                const recovery = stability >= 60 ? 15 : 10;
                setAp(Math.min(20, ap + recovery)); 
                addLog(`進入 ${ny} 年 ${nm} 月。`);
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 8));

            const resetGame = () => {
                setMoney(2000); setCarbon(0); setYear(1); setMonth(1); setAp(10);
                setGrid(Array(36).fill(null).map(() => ({
                    content: null,
                    type: Math.random() > 0.85 ? 'gravel' : (Math.random() < 0.1 ? 'wetland' : 'normal')
                })));
                setIsVictory(false);
                setShowTutorial(true);
                addLog('挑戰重新開始！');
            };

            const handleCellClick = (i) => {
                const cell = grid[i];
                if (ap <= 0) { addLog("❌ 體力耗盡，請點擊下個月。"); return; }
                if (!cell.content || cell.content.isWeed) {
                    const crop = CROPS[selectedCrop];
                    if (money < crop.cost) { addLog("💰 資金不足！"); return; }
                    if (crop.soil_pref && crop.soil_pref !== cell.type) {
                        addLog(`⚠️ ${crop.name}需要濕地。`); return;
                    }
                    const newGrid = [...grid];
                    newGrid[i].content = { ...crop, age: 0, isMature: false };
                    setGrid(newGrid); setMoney(m => m - crop.cost); setAp(a => a - 1);
                    addLog(`🌱 種下 ${crop.name}。`);
                } else if (cell.content.isMature) {
                    setMoney(m => m + (cell.content.money || 0));
                    setCarbon(c => c + cell.content.carbon);
                    const newGrid = [...grid]; newGrid[i].content = null; setGrid(newGrid); setAp(a => a - 1);
                    addLog(`🧺 收穫 ${cell.content.name}！`);
                }
            };

            return (
                <div className="h-screen w-screen flex flex-col md:flex-row text-slate-800 relative">
                    
                    {/* 勝利結算畫面 */}
                    {isVictory && (
                        <div className="victory-overlay fixed inset-0 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-10 md:p-16 max-w-2xl w-full animate-pop shadow-2xl text-center">
                                <span className="text-8xl mb-6 block">🏆</span>
                                <h2 className="text-5xl font-black text-green-800 mb-4">挑戰成功！</h2>
                                <p className="text-2xl text-slate-600 font-bold mb-8 italic">
                                    你打造了一座完美的自律森林！
                                </p>
                                <div className="bg-green-100 p-8 rounded-[2rem] border-4 border-green-200 mb-10">
                                    <p className="text-xl font-bold text-green-700 uppercase tracking-widest mb-2">本次遊戲耗時</p>
                                    <div className="text-6xl font-black text-green-900">
                                        {year} <span className="text-2xl">年</span> {month} <span className="text-2xl">個月</span>
                                    </div>
                                </div>
                                <button onClick={resetGame} className="w-full bg-green-700 hover:bg-green-800 text-white py-6 rounded-3xl text-3xl font-black shadow-lg transition-all active:scale-95">
                                    再應戰一次 🔄
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 教學導覽 */}
                    {showTutorial && (
                        <div className="tutorial-overlay fixed inset-0 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 md:p-12 max-w-3xl w-full animate-pop shadow-2xl">
                                <h2 className="text-4xl font-black text-green-700 mb-6 text-center">任務：達成 100% 穩定度</h2>
                                <div className="space-y-6 text-lg text-slate-700">
                                    <div className="bg-amber-50 p-6 rounded-3xl border-2 border-amber-200">
                                        <h3 className="font-black text-amber-800 mb-2">🎯 目標說明</h3>
                                        <p>你的目標是在土地上種植**所有層次**的植物，讓系統達成 100% 穩定。我們將記錄你達成這個目標需要花費多少時間！</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-center font-bold">
                                        <div className="p-4 bg-green-50 rounded-2xl">⚡ 初始資金：$2000</div>
                                        <div className="p-4 bg-blue-50 rounded-2xl">🔄 自律：地瓜葉可除草</div>
                                    </div>
                                </div>
                                <button onClick={() => setShowTutorial(false)} className="mt-8 w-full bg-green-600 text-white py-5 rounded-3xl text-3xl font-black">
                                    開始計時挑戰 🚀
                                </button>
                            </div>
                        </div>
                    )}

                    <aside className="w-full md:w-96 glass-panel border-b md:border-r flex flex-col shadow-2xl z-10">
                        <div className="p-8 bg-gradient-to-br from-green-900 to-black text-white">
                            <h1 className="text-5xl font-black mb-1 tracking-tighter italic">食物森林</h1>
                            <p className="text-green-400 text-sm font-bold tracking-[0.3em] opacity-80 uppercase italic">Time Challenge</p>
                        </div>
                        <div className="p-6 space-y-4">
                            <div className="bg-white p-4 rounded-2xl border-2 border-slate-100 shadow-sm">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs font-black text-slate-400 uppercase">目標穩定度進度</span>
                                    <span className="text-lg font-black text-green-600">{stability} / 100%</span>
                                </div>
                                <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-green-500 progress-bar" style={{ width: `${stability}%` }}></div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3 text-center">
                                <div className="bg-white p-3 rounded-2xl border border-slate-100">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase">目前資金</div>
                                    <div className="text-2xl font-black text-amber-600">${money}</div>
                                </div>
                                <div className="bg-white p-3 rounded-2xl border border-slate-100">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase">總經過時間</div>
                                    <div className="text-lg font-black">Y{year} M{month}</div>
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 hidden md:block">
                            <div className="space-y-3">
                                {Object.values(CROPS).map(crop => (
                                    <button key={crop.id} onClick={() => setSelectedCrop(crop.id)}
                                        className={`w-full p-4 rounded-2xl border-4 transition-all flex items-center gap-4 ${selectedCrop === crop.id ? 'border-green-600 bg-green-50 scale-[1.02]' : 'border-transparent bg-white shadow-sm'}`}>
                                        <span className="text-4xl">{crop.icon}</span>
                                        <div className="text-left leading-tight">
                                            <div className="font-black text-lg">{crop.name}</div>
                                            <div className="text-[10px] font-bold text-slate-400">{crop.desc}</div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col p-6 items-center justify-center bg-[#e8ede8] relative">
                        <div className="w-full max-w-lg mb-6">
                            <div className="flex justify-between items-end mb-2 font-black">
                                <span className="text-xl text-slate-600">⚡ 能量(AP)</span>
                                <span className="text-2xl text-blue-600">{ap} / 20</span>
                            </div>
                            <div className="h-4 w-full bg-slate-200 rounded-full overflow-hidden shadow-inner border-2 border-white">
                                <div className="h-full bg-blue-500 progress-bar" style={{ width: `${(ap / 20) * 100}%` }}></div>
                            </div>
                        </div>

                        <div className="farm-grid">
                            {grid.map((cell, i) => (
                                <div key={i} onClick={() => handleCellClick(i)}
                                    className={`cell-aspect rounded-2xl cursor-pointer flex flex-col items-center justify-center relative shadow-md transition-all active:scale-90
                                    ${cell.type === 'gravel' ? 'border-orange-300 bg-orange-50' : cell.type === 'wetland' ? 'border-blue-400 bg-blue-50' : 'border-white bg-white/60 hover:bg-white'}`}>
                                    {!cell.content && <div className="text-[8px] font-black opacity-10">{cell.type === 'gravel' ? 'GRAVEL' : cell.type === 'wetland' ? 'WETLAND' : ''}</div>}
                                    {cell.content ? (
                                        <>
                                            <span className={`text-4xl md:text-5xl animate-pop ${cell.content.isMature ? 'animate-bounce' : ''}`}>
                                                {cell.content.isWeed ? '🌾' : (cell.content.isMature ? cell.content.icon : '🌱')}
                                            </span>
                                            {!cell.content.isMature && !cell.content.isWeed && (
                                                <div className="absolute bottom-2 w-3/4 h-2 bg-slate-200/50 rounded-full overflow-hidden">
                                                    <div className="h-full bg-green-500" style={{ width: `${Math.min(100, (cell.content.age / cell.content.growth) * 100)}%` }}></div>
                                                </div>
                                            )}
                                        </>
                                    ) : null}
                                </div>
                            ))}
                        </div>

                        <button onClick={handleNextMonth} className="mt-8 w-full max-w-lg bg-slate-900 text-white py-6 rounded-3xl font-black text-2xl shadow-2xl hover:bg-black active:scale-95 transition-all">
                            📅 進入下個月
                        </button>
                    </main>

                    <div className="fixed bottom-6 right-6 w-80 pointer-events-none z-50">
                        <div className="bg-slate-900/95 backdrop-blur-md p-6 rounded-[2rem] shadow-2xl border-2 border-white/20">
                            <p className="text-white/40 text-[10px] font-black mb-3 tracking-widest uppercase">生態狀態監測</p>
                            <div className="space-y-2">
                                {logs.map((log, i) => (
                                    <div key={i} className={`text-sm md:text-base font-bold animate-pop leading-tight ${log.includes('✨') ? 'text-yellow-300' : (log.includes('❌') || log.includes('⚠️') ? 'text-red-400' : 'text-green-400')}`}>
                                        • {log}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
